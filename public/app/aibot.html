<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>min-pro-AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";
        window.webllm = webllm;
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { indigo: { 600: '#6366f1', 700: '#4f46e5' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .chat-area { height: calc(100vh - 220px); }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0b0f1a] text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <!-- Header & Model Selector -->
    <header class="sticky top-0 z-50 bg-white/90 dark:bg-[#161b2c]/90 border-b border-slate-200 dark:border-slate-800 px-4 py-3 shadow-sm">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-4 justify-between items-center">
            
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-lg">
                    <i data-lucide="layers"></i>
                </div>
                <h1 class="text-md font-bold tracking-tight hidden sm:block">AI Switcher</h1>
            </div>

            <!-- Model Selection Bar -->
            <div class="flex items-center gap-2 w-full md:w-auto">
                <select id="model-select" class="flex-1 md:w-64 bg-slate-100 dark:bg-slate-800 border-none rounded-lg px-3 py-2 text-xs font-medium outline-none ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-indigo-500">
                    <optgroup label="🚀 超軽量 (爆速)">
                        <option value="Qwen2.5-0.5B-Instruct-q4f16_1-MLC">Qwen 2.5 0.5B (日本語◎)</option>
                        <option value="SmolLM2-360M-Instruct-q4f16_1-MLC">SmolLM2 360M (極小)</option>
                    </optgroup>
                    <optgroup label="⚡ バランス (推奨)">
                        <option value="Qwen2.5-1.5B-Instruct-q4f16_1-MLC">Qwen 2.5 1.5B (高精度)</option>
                        <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC">Llama 3.2 1B (高速)</option>
                        <option value="Phi-3.5-mini-instruct-q4f16_1-MLC">Phi-3.5 Mini (MS製)</option>
                    </optgroup>
                    <optgroup label="💎 高性能 (メモリ8GB+推奨)">
                        <option value="Llama-3.1-8B-Instruct-q4f16_1-MLC">Llama 3.1 8B</option>
                        <option value="Qwen2.5-7B-Instruct-q4f16_1-MLC">Qwen 2.5 7B (最強)</option>
                    </optgroup>
                </select>
                <button id="load-btn" onclick="switchModel()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-4 py-2 rounded-lg transition-all flex items-center gap-2 whitespace-nowrap shadow-md shadow-indigo-500/20">
                    <i data-lucide="refresh-cw" size="14"></i> <span>読込/変更</span>
                </button>
            </div>

            <div class="flex items-center gap-3">
                <div id="progress-container" class="hidden flex flex-col items-end">
                    <span id="progress-text" class="text-[9px] font-mono mb-1 text-slate-500">0%</span>
                    <div class="w-20 h-1 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-indigo-500 w-0 transition-all"></div>
                    </div>
                </div>
                <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                    <i id="theme-icon" data-lucide="sun" size="18" class="text-slate-500 dark:text-yellow-400"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Chat Area -->
    <main id="chat-box" class="chat-area overflow-y-auto px-4 py-6 max-w-4xl mx-auto w-full space-y-6">
        <div class="flex gap-4 items-start fade-in">
            <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white flex-shrink-0">
                <i data-lucide="bot" size="18"></i>
            </div>
            <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl rounded-tl-none border border-slate-200 dark:border-slate-700 shadow-sm max-w-[85%] text-sm leading-relaxed">
                <p>こんにちは。いつでも上部のメニューからモデルを選んで<strong>「読込/変更」</strong>ボタンを押してください。現在、APIキーを使わずにあなたのブラウザ上でAIが動作します。</p>
            </div>
        </div>
    </main>

    <!-- Footer Input Area -->
    <footer class="mt-auto p-4 bg-white dark:bg-[#161b2c] border-t border-slate-200 dark:border-slate-800">
        <div class="max-w-4xl mx-auto relative flex items-end gap-2">
            <div class="relative flex-1">
                <textarea id="user-input" rows="1" disabled
                    class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl p-3 pr-12 focus:ring-2 focus:ring-indigo-500 outline-none resize-none text-sm disabled:opacity-50 transition-all"
                    placeholder="モデルを読み込んでください..."></textarea>
                <button id="send-btn" onclick="handleSend()" disabled
                    class="absolute right-2 bottom-1.5 p-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-all disabled:opacity-30">
                    <i data-lucide="send" size="18"></i>
                </button>
            </div>
        </div>
        <p id="model-status" class="text-[10px] text-center text-slate-400 mt-2 font-medium">Ready to start</p>
    </footer>

    <script>
        let engine = null;
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const loadBtn = document.getElementById('load-btn');
        const sendBtn = document.getElementById('send-btn');
        const modelStatus = document.getElementById('model-status');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const progressContainer = document.getElementById('progress-container');

        lucide.createIcons();

        // テーマ切り替え
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            const icon = document.getElementById('theme-icon');
            icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }

        // モデル切り替え・読み込み
        async function switchModel() {
            const modelId = document.getElementById('model-select').value;
            
            // UIを読み込み状態に
            loadBtn.disabled = true;
            loadBtn.querySelector('span').innerText = "読込中...";
            userInput.disabled = true;
            sendBtn.disabled = true;
            progressContainer.classList.remove('hidden');
            modelStatus.innerText = `Loading ${modelId.split('-')[0]}...`;

            try {
                // 既存のエンジンがあれば破棄してメモリを解放
                if (engine) {
                    await engine.unload();
                    appendSystemMessage(`以前のモデルをアンロードしました。`);
                }

                engine = await webllm.CreateMLCEngine(modelId, {
                    initProgressCallback: (report) => {
                        const progress = Math.round(report.progress * 100);
                        progressBar.style.width = progress + '%';
                        progressText.innerText = progress + '%';
                        modelStatus.innerText = report.text;
                    }
                });

                modelStatus.innerText = `Active Model: ${modelId}`;
                modelStatus.classList.add('text-indigo-500');
                loadBtn.disabled = false;
                loadBtn.querySelector('span').innerText = "変更";
                userInput.disabled = false;
                userInput.placeholder = "メッセージを入力...";
                sendBtn.disabled = false;
                progressContainer.classList.add('hidden');
                
                appendSystemMessage(`モデルを **${modelId}** に切り替えました。`);

            } catch (e) {
                console.error(e);
                alert("モデルの読み込みに失敗しました。WebGPU対応のブラウザか確認し、メモリ不足にご注意ください。");
                loadBtn.disabled = false;
                loadBtn.querySelector('span').innerText = "再試行";
            }
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || !engine) return;

            userInput.value = "";
            userInput.style.height = "auto";
            appendMessage("user", text);

            const aiBubble = appendMessage("ai", "Thinking...");
            const display = aiBubble.querySelector('.msg-text');
            let fullText = "";

            try {
                const chunks = await engine.chat.completions.create({
                    messages: [
                        { role: "system", content: "あなたは日本語を話す有能なAIです。常に日本語で簡潔に回答してください。" },
                        { role: "user", content: text }
                    ],
                    stream: true,
                });

                display.innerText = "";
                for await (const chunk of chunks) {
                    fullText += chunk.choices[0]?.delta?.content || "";
                    display.innerText = fullText;
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            } catch (err) {
                display.innerText = "エラーが発生しました。別の軽量モデルに切り替えてみてください。";
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex gap-4 ${role === 'user' ? 'justify-end' : ''} fade-in`;
            div.innerHTML = `
                ${role === 'ai' ? '<div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white flex-shrink-0 shadow-md"><i data-lucide="bot" size="18"></i></div>' : ''}
                <div class="${role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white dark:bg-slate-800 dark:border-slate-700 border border-slate-200 rounded-tl-none'} p-4 rounded-2xl shadow-sm max-w-[85%]">
                    <p class="msg-text text-sm leading-relaxed whitespace-pre-wrap">${text}</p>
                </div>
                ${role === 'user' ? '<div class="w-8 h-8 rounded-lg bg-slate-800 dark:bg-slate-700 flex items-center justify-center text-white flex-shrink-0"><i data-lucide="user" size="18"></i></div>' : ''}
            `;
            chatBox.appendChild(div);
            lucide.createIcons();
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        function appendSystemMessage(text) {
            const p = document.createElement('p');
            p.className = "text-center text-[10px] text-slate-400 font-mono py-2 italic";
            p.innerText = `[System: ${text}]`;
            chatBox.appendChild(p);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !userInput.disabled) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
</body>
</html>
